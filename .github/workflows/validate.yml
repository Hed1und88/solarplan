name: Validate SolarPlan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck five passes
        run: |
          mkdir -p validation-logs
          failed=0
          for i in 1 2 3 4 5; do
            echo "Typecheck pass $i of 5"
            npm run typecheck >"validation-logs/typecheck-$i.log" 2>&1 || failed=1
          done
          exit $failed
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: validation-logs

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint five passes
        run: |
          mkdir -p validation-logs
          failed=0
          for i in 1 2 3 4 5; do
            echo "Lint pass $i of 5"
            npm run lint >"validation-logs/lint-$i.log" 2>&1 || failed=1
          done
          exit $failed
      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: validation-logs

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build five passes
        run: |
          mkdir -p validation-logs
          failed=0
          for i in 1 2 3 4 5; do
            echo "Build pass $i of 5"
            rm -rf dist
            npm run build >"validation-logs/build-$i.log" 2>&1 || failed=1
          done
          exit $failed
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: validation-logs
