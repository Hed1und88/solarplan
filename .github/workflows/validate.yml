name: Validate SolarPlan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck five passes
        run: |
          mkdir -p validation-logs
          failed=0
          for i in 1 2 3 4 5; do
            echo "Typecheck pass $i of 5"
            npm run typecheck >"validation-logs/typecheck-$i.log" 2>&1 || failed=1
          done
          exit $failed
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: validation-logs

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint five passes
        run: |
          mkdir -p validation-logs
          failed=0
          for i in 1 2 3 4 5; do
            echo "Lint pass $i of 5"
            npm run lint >"validation-logs/lint-$i.log" 2>&1 || failed=1
          done
          exit $failed
      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: validation-logs

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build five passes
        run: |
          mkdir -p validation-logs
          failed=0
          for i in 1 2 3 4 5; do
            echo "Build pass $i of 5"
            rm -rf dist
            npm run build >"validation-logs/build-$i.log" 2>&1 || failed=1
          done
          exit $failed
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: validation-logs

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit files five passes
        run: |
          mkdir -p audit-reports
          for i in 1 2 3 4 5; do
            echo "Unused-file audit pass $i of 5"
            node scripts/audit-unused-files.mjs "audit-reports/UNUSED_FILE_AUDIT_PASS_$i.md" >/dev/null
          done
          cmp audit-reports/UNUSED_FILE_AUDIT_PASS_1.md audit-reports/UNUSED_FILE_AUDIT_PASS_2.md || true
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: unused-file-audit
          path: audit-reports
