name: Validate SolarPlan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck five passes
        run: |
          for i in 1 2 3 4 5; do
            echo "Typecheck pass $i of 5"
            npm run typecheck
          done

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint five passes
        run: |
          for i in 1 2 3 4 5; do
            echo "Lint pass $i of 5"
            npm run lint
          done

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build five passes
        run: |
          for i in 1 2 3 4 5; do
            echo "Build pass $i of 5"
            rm -rf dist
            npm run build
          done
