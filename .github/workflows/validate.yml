name: Validate SolarPlan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck five passes
        run: for i in 1 2 3 4 5; do echo "Typecheck pass $i"; npm run typecheck; done
      - name: Lint five passes
        run: for i in 1 2 3 4 5; do echo "Lint pass $i"; npm run lint; done
      - name: Build five passes
        run: for i in 1 2 3 4 5; do echo "Build pass $i"; rm -rf dist; npm run build; done
