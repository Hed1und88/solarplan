name: Generate exact lint corrections

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:fix
      - uses: actions/upload-artifact@v4
        with:
          name: corrected-lint-files
          path: |
            src/pages/Calendar.jsx
            src/pages/Leads.jsx
            src/pages/Projects.jsx
            src/pages/Settings.jsx
